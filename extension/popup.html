<!doctype html><html><head><meta charset="utf-8"><style>
  body{font-family:system-ui,-apple-system,sans-serif;width:320px;margin:0;padding:16px;color:#1c1917}
  h1{font-size:15px;margin:0 0 12px}
  label{font-size:12px;color:#78716c}
  input{width:100%;box-sizing:border-box;border:1px solid #d6d3d1;border-radius:8px;padding:8px;margin-top:4px;font-size:13px}
  .row{margin-bottom:12px}
  button{width:100%;border:0;border-radius:8px;padding:10px;font-size:14px;font-weight:600;cursor:pointer;margin-top:6px}
  .primary{background:#059669;color:#fff}
  .ghost{background:#f5f5f4;color:#44403c}
  #status{font-size:12px;margin-top:10px;white-space:pre-wrap;line-height:1.5}
  .ok{color:#059669}.err{color:#dc2626}.muted{color:#a8a29e}
  a{color:#059669}
</style></head><body>
  <h1>📘 备考助手采集</h1>
  <div class="row">
    <label>网站地址 Site URL</label>
    <input id="base" placeholder="https://beikao-app-production.up.railway.app">
  </div>
  <div class="row">
    <label>采集令牌 Token（网站设置页获取）</label>
    <input id="token" placeholder="paste token">
  </div>
  <button class="primary" id="grab">采集当前页 Collect this page</button>
  <button class="ghost" id="auto">自动翻页采集 Auto-paginate…</button>
  <div id="status" class="muted">登录资料网站后打开要采集的页面,再点上面的按钮。</div>
  <script src="popup.js"></script>
</body></html>
